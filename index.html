<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Future Doctor!</title>
<style>
body{margin:0;font-family:'Segoe UI';background:linear-gradient(135deg,#e0f7fa,#fff);text-align:center}
h1{margin-top:20px;font-size:26px;color:#00796b}
.card{margin:15px auto;padding:18px;width:92%;max-width:360px;border-radius:20px;background:#fff;box-shadow:0 10px 25px rgba(0,0,0,0.2)}
.btn{padding:12px;font-size:16px;background:#00796b;color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:10px;width:100%}
.btn:hover{background:#004d40}
.hidden{display:none;margin-top:15px}
.heartbeat{font-size:26px;color:red;animation:beat 1s infinite}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.typing{font-size:16px;margin-top:10px;min-height:40px}
.bigAnimation{font-size:36px;animation:pop 1s ease}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* Quiz buttons different */
.option{display:block;margin:8px 0;padding:10px;border-radius:8px;border:2px solid #00796b;background:#e0f7fa;color:#004d40;font-weight:bold}
.option:nth-child(2){background:#fff3e0;border-color:#ff9800}
.option:nth-child(3){background:#fce4ec;border-color:#e91e63}

.result{margin-top:8px;font-weight:bold}

/* Popup */
.popup{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.6);
 display:none;align-items:center;justify-content:center;
}
.popup-card{
 background:#fff;padding:20px;border-radius:15px;width:80%;max-width:300px;text-align:center;
 animation:pop 0.5s ease;
}

canvas{position:fixed;top:0;left:0;pointer-events:none}
.footer{margin-top:15px;font-size:14px;color:#666}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<h1>🎉 Happy Birthday Future Doctor! 🎉</h1>

<div class="card">
<p>NEET Topper in making 🩺</p>
<p class="heartbeat">❤️</p>

<button class="btn" onclick="showSurprise()">🎁 Big Surprise</button>
<div id="surprise" class="hidden">
<div class="typing" id="typing"></div>
<div id="big" class="bigAnimation"></div>
</div>

<button class="btn" onclick="showQuiz()">🧠 NEET Mini Quiz</button>
<div id="quiz" class="hidden">
<p><b>Q: What is the powerhouse of the cell?</b></p>
<button class="option" onclick="checkAnswer(true)">Mitochondria</button>
<button class="option" onclick="checkAnswer(false)">Nucleus</button>
<button class="option" onclick="checkAnswer(false)">Ribosome</button>
<div id="result" class="result"></div>
</div>


</div>

<!-- Popup -->
<div id="popup" class="popup">
  <div class="popup-card">
    <h2>🎓 NEET Result</h2>
    <p><b>Rank: AIR 1 😎</b></p>
    <p>Congrats Future Doctor 🩺</p>
    <button class="btn" onclick="closePopup()">Close</button>
  </div>
</div>

<div class="footer">Made with ❤️ for future Dr.</div>

<script>
function showSurprise(){
 document.getElementById("surprise").style.display="block";
 typeText("May your rank be AIR 1 😎\nFuture Doctor loading... ⏳");
 setTimeout(()=>{document.getElementById("big").innerHTML="🎉 DR. LOADING... 🩺"},1500);
}

function typeText(text){
 let i=0;const el=document.getElementById("typing");el.innerHTML="";
 function type(){if(i<text.length){el.innerHTML+=text[i++];setTimeout(type,40)}}type();
}

function showQuiz(){document.getElementById("quiz").style.display="block"}

function checkAnswer(correct){
 const result=document.getElementById("result");
 if(correct){
   result.innerHTML="✅ Correct!";
   startConfetti();
   setTimeout(()=>{document.getElementById("popup").style.display="flex"},800);
 }else{
   result.innerHTML="❌ Oops! Try again 😄";
 }
}

function closePopup(){document.getElementById("popup").style.display="none"}

function startConfetti(){
 const canvas=document.getElementById('confetti');
 const ctx=canvas.getContext('2d');
 canvas.width=window.innerWidth;canvas.height=window.innerHeight;
 let pieces=[];
 for(let i=0;i<100;i++){pieces.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*6+2,d:Math.random()*50})}
 function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle="#00796b";pieces.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()});update()}
 function update(){pieces.forEach(p=>{p.y+=Math.cos(p.d)+1;p.x+=Math.sin(p.d);if(p.y>canvas.height)p.y=0})}
 setInterval(draw,20);
}
</script>

</body>
</html>
