<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET Pro Test App 🇮🇳</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
header{background:linear-gradient(90deg,orange,white,green);color:black;text-align:center;padding:10px}
.container{display:flex;flex-wrap:wrap}
.left{flex:3;padding:15px}
.right{flex:1;background:#1e293b;padding:10px}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.subjects button{background:#2563eb;color:white}
.question{background:#1e293b;margin-top:10px;padding:10px;border-radius:8px}
.option{display:block;margin:5px 0}
.timer{color:yellow}
.resultScreen{display:none;text-align:center;padding:30px}
@media(max-width:768px){.container{flex-direction:column}}
</style>
</head>
<body>
<header>🇮🇳 CUET PRO EXAM 🇮🇳</header>

<div id="login" style="text-align:center;padding:40px">
<input id="name" placeholder="Enter Name"><br>
<button onclick="start()">Start</button>
</div>

<div id="subjectScreen" style="display:none;text-align:center">
<h2>Select Subject</h2>
<div class="subjects">
<button onclick="load('phy')">Physics</button>
<button onclick="load('chem')">Chemistry</button>
<button onclick="load('math')">Math</button>
<button onclick="load('bio')">Biology</button>
<button onclick="load('eng')">English</button>
<button onclick="load('pcbe')">PCBE</button>
<button onclick="load('pcme')">PCME</button>
</div>
</div>

<div class="container" id="exam" style="display:none">
<div class="left">
<div id="questions"></div>
<button onclick="submitTest()">Submit</button>
</div>
<div class="right">
<div class="timer" id="timer"></div>
<div id="nav"></div>
</div>
</div>

<div class="resultScreen" id="result">
<h2>Result</h2>
<div id="out"></div>
<button onclick="location.reload()">Retest</button>
</div>

<script>
let answers={},startTime;

function start(){
 if(!document.getElementById('name').value) return alert('Enter name');
 document.getElementById('login').style.display='none';
 document.getElementById('subjectScreen').style.display='block';
}

async function load(subject){
 document.getElementById('subjectScreen').style.display='none';
 document.getElementById('exam').style.display='flex';

 let res=await fetch(subject+".json");
 let data=await res.json();

 // shuffle
 data.sort(()=>Math.random()-0.5);
 data=data.slice(0,50);

 let html="",nav="";
 answers={};

 data.forEach((q,i)=>{
 let n=i+1;
 html+=`<div class="question" id="q${n}"><b>${n}. ${q.q}</b>`;
 q.options.forEach((o,j)=>{
 let L=String.fromCharCode(65+j);
 html+=`<label class="option"><input type="radio" name="q${n}" value="${L}">${L}. ${o}</label>`;
 });
 html+=`</div>`;
 answers[n]=q.answer;
 nav+=`<button onclick="document.getElementById('q${n}').scrollIntoView()">${n}</button>`;
 });

 document.getElementById('questions').innerHTML=html;
 document.getElementById('nav').innerHTML=nav;
 startTimer();
}

function submitTest(){
 let score=0,attempt=0,total=Object.keys(answers).length;
 for(let i=1;i<=total;i++){
 let s=document.querySelector(`input[name=q${i}]:checked`);
 if(s) attempt++;
 if(s && s.value==answers[i]) score++;
 }
 let wrong=attempt-score;
 let time=Math.floor((Date.now()-startTime)/1000);
 let acc=((score/total)*100).toFixed(2);

 document.getElementById('exam').style.display='none';
 document.getElementById('result').style.display='block';
 document.getElementById('out').innerHTML=`
 Score: ${score}/${total}<br>
 Attempted: ${attempt}<br>
 Not Attempted: ${total-attempt}<br>
 Right: ${score}<br>
 Wrong: ${wrong}<br>
 Accuracy: ${acc}%<br>
 Time: ${time}s
 `;
}

function startTimer(){
 startTime=Date.now();
 setInterval(()=>{
 let t=Math.floor((Date.now()-startTime)/1000);
 let m=String(Math.floor(t/60)).padStart(2,'0');
 let s=String(t%60).padStart(2,'0');
 document.getElementById('timer').innerText=`Time: ${m}:${s}`;
 },1000);
}
</script>
</body>
</html>
