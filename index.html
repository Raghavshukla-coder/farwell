<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET PRO 🇮🇳</title>

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --card:#ffffff;
}

body{
 margin:0;
 font-family:sans-serif;
 background: var(--bg);
 color: var(--text);
}

header{
 text-align:center;
 padding:12px;
 font-size:22px;
 font-weight:bold;
 background: linear-gradient(90deg, orange, white, green);
}

.dark{
 --bg:#0f172a;
 --text:#fff;
 --card:#1e293b;
}

.topbar{
 display:flex;
 justify-content:flex-end;
 padding:10px;
}

button{
 padding:10px;
 margin:8px 0;
 border:none;
 border-radius:8px;
 cursor:pointer;
 background:#1e293b;
 color:white;
 width:200px;
}

.subjects{
 display:flex;
 flex-direction:column;
 align-items:center;
}

.container{
 display:flex;
 flex-wrap:wrap;
}

.left{
 flex:3;
 padding:15px;
}

.question{
 background:var(--card);
 margin-top:10px;
 padding:12px;
 border-radius:10px;
}

.option{
 display:block;
 margin:6px 0;
}

.timer{
 font-size:18px;
 font-weight:bold;
 text-align:center;
}

.resultScreen{
 display:none;
 text-align:center;
 padding:40px;
 font-size:20px;
}

#out{
 background:var(--card);
 padding:20px;
 border-radius:10px;
 display:inline-block;
}

/* MOBILE FIX */
@media(max-width:768px){
 .container{
   flex-direction:column;
 }
 .timer{
   position:fixed;
   top:60px;
   left:0;
   width:100%;
   background:#000;
   color:#fff;
   padding:10px;
   z-index:1000;
 }
 .left{
   margin-top:80px;
 }
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="toggleMode()">🌙 Dark Mode</button>
</div>

<header>🇮🇳 CUET PRO EXAM 🇮🇳</header>

<div id="login" style="text-align:center;padding:40px">
<input id="name" placeholder="Enter Name"><br><br>
<button onclick="start()">Start</button>
</div>

<div id="subjectScreen" style="display:none;text-align:center">
<h2>Select Subject</h2>

<div class="subjects">
<button onclick="load('phy')">Physics</button>
<button onclick="load('chem')">Chemistry</button>
<button onclick="load('math')">Math</button>
<button onclick="load('bio')">Biology</button>
<button onclick="load('eng')">English</button>
<button onclick="load('pcme')">PCME</button>
</div>
</div>

<div class="container" id="exam" style="display:none">

<div class="left">
<div id="questions"></div>
<button onclick="submitTest()">Submit</button>
</div>

<div class="timer" id="timer">Time: 00:00</div>

</div>

<div class="resultScreen" id="result">
<h2>📊 Result</h2>
<div id="out"></div>
<br><br>
<button onclick="location.reload()">Retest</button>
</div>

<script>
let answers={},startTime;

function toggleMode(){
 document.body.classList.toggle('dark');
}

function start(){
 if(!document.getElementById('name').value){
   alert("Enter name");
   return;
 }
 document.getElementById('login').style.display='none';
 document.getElementById('subjectScreen').style.display='block';
}

async function load(subject){
 document.getElementById('subjectScreen').style.display='none';
 document.getElementById('exam').style.display='flex';

 try {
   let res = await fetch(subject + ".json");
   let data = await res.json();

   // For passages in JSON
   if(data.passage) {
     let passageHTML = `<div class="question"><b>Passage:</b><p>${data.passage}</p></div>`;
     document.getElementById('questions').innerHTML = passageHTML;
     data = data.questions;
   } else {
     document.getElementById('questions').innerHTML = "";
   }

   data.sort(()=>Math.random()-0.5);
   data = data.slice(0,50);

   let html="";
   answers={};

   data.forEach((q,i)=>{
     let n=i+1;

     html+=`<div class="question">
     <b>${n}. ${q.question}</b>`;

     q.options.forEach((o,j)=>{
       let L=String.fromCharCode(65+j);
       html+=`<label class="option">
       <input type="radio" name="q${n}" value="${L}">
       ${L}. ${o}
       </label>`;
     });

     html+=`</div>`;
     answers[n]=q.answer;
   });

   document.getElementById('questions').innerHTML += html;
   startTimer();
 } catch(err){
   alert("Error loading JSON: " + err);
 }
}

function submitTest(){
 let score=0,attempt=0,total=Object.keys(answers).length;

 for(let i=1;i<=total;i++){
   let s=document.querySelector(`input[name=q${i}]:checked`);
   if(s) attempt++;
   if(s && s.value===answers[i]) score++;
 }

 let wrong=attempt-score;
 let notAttempt=total-attempt;
 let time=Math.floor((Date.now()-startTime)/1000);
 let acc=((score/total)*100).toFixed(2);

 document.getElementById('exam').style.display='none';
 document.getElementById('result').style.display='block';

 document.getElementById('out').innerHTML=`
 Score: ${score}/${total}<br>
 Attempted: ${attempt}<br>
 Not Attempted: ${notAttempt}<br>
 Right: ${score}<br>
 Wrong: ${wrong}<br>
 Accuracy: ${acc}%<br>
 Time: ${time}s
 `;
}

function startTimer(){
 startTime=Date.now();

 setInterval(()=>{
   let t=Math.floor((Date.now()-startTime)/1000);
   let m=String(Math.floor(t/60)).padStart(2,'0');
   let s=String(t%60).padStart(2,'0');
   document.getElementById('timer').innerText=`Time: ${m}:${s}`;
 },1000);
}
</script>

</body>
</html>
