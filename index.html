<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET PRO 🇮🇳</title>

<style>
body{margin:0;font-family:sans-serif;background:#fff;color:#111}
.dark{background:#0f172a;color:#fff}

header{
 text-align:center;
 padding:12px;
 font-size:22px;
 font-weight:bold;
 background:linear-gradient(90deg,orange,white,green);
}

.topbar{
 display:flex;
 justify-content:flex-end;
 padding:10px;
}

button{
 padding:10px;
 margin:8px 0;
 border:none;
 border-radius:8px;
 background:#1e293b;
 color:white;
 width:200px;
}

.subjects{
 display:flex;
 flex-direction:column;
 align-items:center;
}

.container{display:flex;flex-wrap:wrap}
.left{flex:3;padding:15px}

.question{
 background:#f1f5f9;
 margin-top:10px;
 padding:12px;
 border-radius:10px;
}

.option{display:block;margin:6px 0}

.timer{
 font-size:18px;
 text-align:center;
 font-weight:bold;
}

.resultScreen{
 display:none;
 text-align:center;
 padding:40px;
}

#out{
 background:#f1f5f9;
 padding:20px;
 border-radius:10px;
 display:inline-block;
 line-height:1.8;
}

/* MOBILE */
@media(max-width:768px){
 .container{flex-direction:column}
 .timer{
  position:fixed;
  top:60px;
  width:100%;
  background:black;
  color:white;
  padding:10px;
 }
 .left{margin-top:80px}
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="toggleMode()">🌙 Dark Mode</button>
</div>

<header>🇮🇳 CUET PRO EXAM 🇮🇳</header>

<div id="subjectScreen" style="text-align:center">
<h2>Select Subject</h2>

<div class="subjects">
<button onclick="startTest('phy')">Physics</button>
<button onclick="startTest('chem')">Chemistry</button>
<button onclick="startTest('math')">Math</button>
<button onclick="startTest('bio')">Biology</button>
<button onclick="startTest('eng')">English</button>
<button onclick="startTest('pcme')">PCME</button>
</div>
</div>

<div class="container" id="exam" style="display:none">
<div class="left">
<div id="questions"></div>
<button onclick="submitTest()">Submit</button>
</div>

<div class="timer" id="timer">Time: 00:00</div>
</div>

<div class="resultScreen" id="result">
<h2>📊 Result</h2>
<div id="out"></div>
<br><br>
<button onclick="location.reload()">Retest</button>
</div>

<script>
let answers={},startTime,timerOn=false;
let qTimes={},currentQ=1,lastTime;

function toggleMode(){
 document.body.classList.toggle('dark');
}

async function startTest(subject){

 timerOn = confirm("Timer chahiye?");

 document.getElementById('subjectScreen').style.display='none';
 document.getElementById('exam').style.display='flex';

 let res = await fetch(subject + ".json");
 let data = await res.json();

 data.sort(()=>Math.random()-0.5);
 data=data.slice(0,50);

 render(data);

 if(!timerOn){
  document.getElementById('timer').style.display="none";
 }
}

function render(data){
 let html="";
 answers={};
 qTimes={};

 data.forEach((q,i)=>{
 let n=i+1;
 qTimes[n]=0;

 html+=`<div class="question" onclick="track(${n})">
 <b>${n}. ${q.q}</b>`;

 q.options.forEach((o,j)=>{
 let L=String.fromCharCode(65+j);
 html+=`<label class="option">
 <input type="radio" name="q${n}" value="${L}">
 ${L}. ${o}
 </label>`;
 });

 html+=`</div>`;
 answers[n]=q.answer;
 });

 document.getElementById('questions').innerHTML=html;

 lastTime=Date.now();
 startTimer();
}

function track(n){
 let now=Date.now();
 if(currentQ){
  qTimes[currentQ]+= (now-lastTime)/1000;
 }
 currentQ=n;
 lastTime=now;
}

function submitTest(){

 track(currentQ);

 let score=0,attempt=0,total=Object.keys(answers).length;

 for(let i=1;i<=total;i++){
 let s=document.querySelector(`input[name=q${i}]:checked`);
 if(s) attempt++;
 if(s && s.value===answers[i]) score++;
 }

 let wrong=attempt-score;
 let notAttempt=total-attempt;
 let time=Math.floor((Date.now()-startTime)/1000);
 let acc=((score/total)*100).toFixed(2);
 let avgTime=(time/total).toFixed(2);

 document.getElementById('exam').style.display='none';
 document.getElementById('result').style.display='block';

 let timeAnalysis="<br><b>Time per Question:</b><br>";
 for(let i=1;i<=5;i++){
  timeAnalysis+=`Q${i}: ${qTimes[i].toFixed(1)}s<br>`;
 }

 document.getElementById('out').innerHTML=`
 Score: ${score}/${total}<br>
 Attempted: ${attempt}<br>
 Not Attempted: ${notAttempt}<br>
 Right: ${score}<br>
 Wrong: ${wrong}<br>
 Accuracy: ${acc}%<br>
 Total Time: ${time}s<br>
 Avg Time/Q: ${avgTime}s
 ${timeAnalysis}
 `;
}

function startTimer(){
 if(!timerOn) return;

 startTime=Date.now();

 setInterval(()=>{
 let t=Math.floor((Date.now()-startTime)/1000);
 let m=String(Math.floor(t/60)).padStart(2,'0');
 let s=String(t%60).padStart(2,'0');
 document.getElementById('timer').innerText=`Time: ${m}:${s}`;
 },1000);
}
</script>

</body>
</html>
